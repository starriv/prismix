# ── Prismix Worker — Railway Configuration ───────────────────────────
#
# Create a second Railway service from the same repo and point it at this
# config (or copy these deploy settings into the service dashboard).
# The worker consumes BullMQ jobs and runs scheduled maintenance jobs.

[build]
builder = "RAILPACK"
buildCommand = "pnpm build"
watchPatterns = ["src/**", "package.json", "pnpm-lock.yaml"]

[deploy]
startCommand = "pnpm start:worker"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
