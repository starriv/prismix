<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="fg" x1="256" y1="100" x2="256" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <radialGradient id="spec" cx="36%" cy="26%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#spec)"/>

  <!-- Prism triangle — subtle fill -->
  <polygon
    points="225,152 135,308 315,308"
    fill="url(#fg)"
    opacity="0.12"
  />
  <!-- Prism triangle — outline -->
  <polygon
    points="225,152 135,308 315,308"
    fill="none"
    stroke="url(#fg)"
    stroke-width="10"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Three refraction rays — straight lines -->
  <g stroke="url(#fg)" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="261" y1="194" x2="390" y2="148"/>
    <line x1="279" y1="225" x2="393" y2="225"/>
    <line x1="297" y1="256" x2="390" y2="312"/>
  </g>
</svg>
